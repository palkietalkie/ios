name: deploy

on:
  workflow_run:
    workflows: [test]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: macos-26
    env:
      SCHEME: PalkieTalkie
      ARCHIVE_PATH: build/PalkieTalkie.xcarchive
      EXPORT_PATH: build/export
      EXPORT_OPTIONS: build/ExportOptions.plist
      # Identifiers, not secrets — safe inline (mirror backend/app/apple_identifiers.py).
      APPLE_ASC_API_KEY_ID: P4HBNA5WD6
      APPLE_ASC_API_ISSUER_ID: 129df326-897e-414d-acda-0e89b6b4f653
      APPLE_ASC_API_KEY_BASE64: ${{ secrets.APPLE_ASC_API_KEY_BASE64 }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Homebrew tools
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Check deploy secrets present
        id: check-secrets
        run: |
          missing=0
          for var in APPLE_ASC_API_KEY_BASE64 \
                     BUILD_CERTIFICATE_BASE64 P12_PASSWORD \
                     PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!var}" ]; then
              echo "missing secret: $var"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TestFlight deploy skipped — required secrets not set."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          # $RUNNER_TEMP is GitHub's per-job temp dir, auto-wiped when the job ends — so the decoded cert / key / keychain never land on a persistent path.
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo -n "$PROVISIONING_PROFILE_BASE64" \
            | base64 --decode -o "$PROFILE_DIR/PalkieTalkie.mobileprovision"

      - name: Write ExportOptions.plist
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          mkdir -p build
          cat > "$EXPORT_OPTIONS" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>uploadBitcode</key><false/>
          </dict>
          </plist>
          PLIST

      - name: Set build number from App Store Connect
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          # Same script release.sh uses; openssl/curl/jq are already on the macOS runner, so nothing to install.
          KEY_P8="$RUNNER_TEMP/asc_api_key.p8"
          echo -n "$APPLE_ASC_API_KEY_BASE64" | base64 --decode -o "$KEY_P8"
          BUILD_NUMBER="$(./scripts/next-build-number.sh --key-path "$KEY_P8")"
          : "${BUILD_NUMBER:?could not compute next build number from ASC}"
          echo "[deploy] CFBundleVersion = $BUILD_NUMBER"
          # Info.plist is regenerated by xcodegen (resets to 1), so stamp the real number here, before archiving.
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" PalkieTalkie/Info.plist

      - name: Archive
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          xcodebuild archive \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -quiet

      - name: Export .ipa
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath "$EXPORT_PATH" \
            -quiet

      - name: Upload to TestFlight
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          # altool reads the private key from ~/.appstoreconnect/private_keys/AuthKey_<id>.p8
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo -n "$APPLE_ASC_API_KEY_BASE64" \
            | base64 --decode -o "$KEY_DIR/AuthKey_${APPLE_ASC_API_KEY_ID}.p8"

          IPA=$(find "$EXPORT_PATH" -name '*.ipa' | head -n 1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APPLE_ASC_API_KEY_ID" \
            --apiIssuer "$APPLE_ASC_API_ISSUER_ID"

      - name: Clean up keychain
        if: always() && steps.check-secrets.outputs.ready == 'true'
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
