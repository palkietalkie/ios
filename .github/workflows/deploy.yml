name: deploy

on:
  workflow_run:
    workflows: [test]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  # The post-upload step pushes a build-<n> tag back to the repo so every TestFlight build maps to its exact commit.
  contents: write

jobs:
  deploy:
    # `test` is skipped (not "success") on main pushes because its macOS jobs are disabled to save Actions minutes — so accept skipped too, else deploy never runs on merge.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'skipped'
    runs-on: macos-26
    env:
      SCHEME: PalkieTalkie
      ARCHIVE_PATH: build/PalkieTalkie.xcarchive
      EXPORT_PATH: build/export
      EXPORT_OPTIONS: build/ExportOptions.plist
      # Identifiers, not secrets — safe inline (mirror backend/app/apple_identifiers.py).
      APPLE_ASC_API_KEY_ID: P4HBNA5WD6
      APPLE_ASC_API_ISSUER_ID: 129df326-897e-414d-acda-0e89b6b4f653
      # The ONLY signing secret needed: cloud-managed (ASC API) signing via -allowProvisioningUpdates creates/downloads the distribution cert + profile at build time, so there's no BUILD_CERTIFICATE / PROVISIONING_PROFILE to keep in sync.
      APPLE_ASC_API_KEY_BASE64: ${{ secrets.APPLE_ASC_API_KEY_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Homebrew tools
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Check deploy secret present
        id: check-secrets
        run: |
          if [ -z "$APPLE_ASC_API_KEY_BASE64" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy skipped — APPLE_ASC_API_KEY_BASE64 not set."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write ASC API key
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          # altool reads ~/.appstoreconnect/private_keys/AuthKey_<id>.p8; xcodebuild reads it via -authenticationKeyPath. One decode, both consumers.
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${APPLE_ASC_API_KEY_ID}.p8"
          echo -n "$APPLE_ASC_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Write ExportOptions.plist
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          mkdir -p build
          cat > "$EXPORT_OPTIONS" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>uploadBitcode</key><false/>
          </dict>
          </plist>
          PLIST

      - name: Set build number from App Store Connect
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          # Same script release-testflight.sh uses; reads APPLE_ASC_API_KEY_BASE64 (job env). openssl/curl/jq are on the macOS runner.
          BUILD_NUMBER="$(./scripts/next-build-number.sh)"
          : "${BUILD_NUMBER:?could not compute next build number from ASC}"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >>"$GITHUB_ENV"
          echo "[deploy] CFBundleVersion = $BUILD_NUMBER"
          # Info.plist is regenerated by xcodegen (resets to 1), so stamp the real number here, before archiving.
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" PalkieTalkie/Info.plist

      - name: Archive (cloud-signed)
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          xcodebuild archive \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APPLE_ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPLE_ASC_API_ISSUER_ID" \
            -quiet

      - name: Export .ipa
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath "$EXPORT_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APPLE_ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPLE_ASC_API_ISSUER_ID" \
            -quiet

      - name: Upload build to App Store Connect (feeds both TestFlight and App Store)
        if: steps.check-secrets.outputs.ready == 'true'
        run: |
          # One upload: the build lands in ASC and is the same binary TestFlight serves to testers AND that gets attached to the App Store version for review. The two submit steps below point it at each.
          IPA=$(find "$EXPORT_PATH" -name '*.ipa' | head -n 1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APPLE_ASC_API_KEY_ID" \
            --apiIssuer "$APPLE_ASC_API_ISSUER_ID"

      - name: Tag this commit with its build number
        if: steps.check-secrets.outputs.ready == 'true'
        # The build is now in ASC under this number, so the commit IS this build. Tag it permanently so we can always diff/checkout exactly what a given TestFlight build shipped (this is the automation that retires hand-guessing which commit was which build).
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "build-$BUILD_NUMBER" -m "TestFlight build $BUILD_NUMBER ($GITHUB_SHA)"
          git push origin "build-$BUILD_NUMBER"

      - name: Submit to TestFlight beta review
        if: steps.check-secrets.outputs.ready == 'true'
        # Upload alone leaves the build un-submitted (external testers never see it); waits out processing then submits.
        run: ./scripts/submit-build.sh --version "$BUILD_NUMBER" --wait

      - name: Submit to App Store review
        if: steps.check-secrets.outputs.ready == 'true'
        # Attaches the build to the editable version and submits for App Review. Requires App Privacy published + metadata complete, or Apple returns the list of blockers (TestFlight above has no such gate).
        run: ./scripts/submit-app-review.sh --version "$BUILD_NUMBER" --wait
