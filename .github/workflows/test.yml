name: test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-pair:
    name: Test pair check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 200
      - run: bash scripts/ci/check_test_pair.sh "origin/${{ github.base_ref }}"

  format:
    name: Format (swiftformat)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - run: brew install swiftformat
      - run: swiftformat --lint .

  lint:
    name: Lint (swiftlint)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - run: brew install swiftlint
      - run: swiftlint lint --strict

  test:
    name: Tests + 90 percent coverage gate
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install Homebrew tools
        run: brew install xcodegen

      - name: Generate Xcode project
        env:
          # CI doesn't ship .env. Dummy non-secret values just to make Info.plist substitution succeed (validate_info_plist.sh checks) and InfoPlistConfigTests pass.
          BACKEND_URL: https://ci.example.invalid
          PERSONAPLEX_HOST: wss://ci.example.invalid
          CLERK_PUBLISHABLE_KEY: pk_test_Y2ktZHVtbXkuY2xlcmsuYWNjb3VudHMuZGV2JA==
        run: xcodegen generate

      - name: Run unit tests with code coverage
        run: |
          xcodebuild test \
            -scheme PalkieTalkie \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            -resultBundlePath TestResults \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO

      - name: Enforce 90 percent line coverage on the PalkieTalkie app target
        run: |
          pct=$(xcrun xccov view --report --json TestResults.xcresult \
            | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); t=next((x for x in d['targets'] if x['name'].startswith('PalkieTalkie.app') or x['name']=='PalkieTalkie'), None); print(round(t['lineCoverage']*100, 2)) if t else (print('NO_TARGET') or exit(1))")
          echo "PalkieTalkie line coverage: ${pct}%"
          awk "BEGIN {exit !(${pct} >= 90)}" \
            || { echo "::error::PalkieTalkie line coverage ${pct}% is below the 90% gate"; exit 1; }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults
          retention-days: 7
