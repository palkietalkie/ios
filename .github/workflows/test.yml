name: test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install Homebrew tools
        run: brew install xcodegen swiftformat swiftlint

      - name: Generate Xcode project
        env:
          # CI doesn't ship .env. These are dummy non-secret values just to make Info.plist substitution succeed and our validate_info_plist.sh + InfoPlistConfigTests pass. They aren't valid runtime endpoints — CI only builds + runs unit tests, never connects to anything.
          BACKEND_URL: https://ci.example.invalid
          PERSONAPLEX_HOST: wss://ci.example.invalid
          CLERK_PUBLISHABLE_KEY: pk_test_Y2ktZHVtbXkuY2xlcmsuYWNjb3VudHMuZGV2JA==
        run: xcodegen generate

      - name: SwiftFormat lint
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint lint --strict

      - name: Run unit tests
        run: |
          xcodebuild test \
            -scheme PalkieTalkie \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults
          retention-days: 7
