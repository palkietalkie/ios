name: PalkieTalkie
options:
  bundleIdPrefix: com.palkietalkie
  deploymentTarget:
    iOS: "26.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  # Fails xcodegen if Info.plist comes out with unresolved `${VAR}` literals or empty required keys. Caught a session where running `xcodegen generate` without sourcing ios/.env shipped an empty CLERK_PUBLISHABLE_KEY, which surfaced as the misleading "Clerk Native API is disabled" error.
  postGenCommand: ./scripts/validate_info_plist.sh PalkieTalkie/Info.plist
  # Locales the app ships with — matches website/src/i18n/config.ts. Adding one: drop translations into Localizable.xcstrings, add the locale here, regen project.
  knownRegions:
    - en
    - ja
    - zh-Hans
    - zh-Hant
    - ko
    - es
    - pt-BR
    - fr
    - de
    - vi
    - id
    - hi

# Files visible in Xcode's project navigator but not compiled
fileGroups:
  - .claude
  - .gitignore
  - CLAUDE.md
  - project.yml
  - scripts

# Thin streaming client only — inference runs server-side. Provider switches via the backend's INFERENCE_PROVIDER env var: OpenAI Realtime (gpt-realtime-mini, current default) or PersonaPlex on Modal (alternative). iOS picks the WS wire protocol based on the `provider` field returned by /conversation/start.
packages:
  Clerk:
    url: https://github.com/clerk/clerk-ios
    from: "1.1.3"
  # alta/swift-opus is the canonical type-safe Opus binding for Apple platforms.
  # Builds against AVAudioPCMBuffer, which matches our AVAudioEngine pipeline.
  Opus:
    url: https://github.com/alta/swift-opus
    revision: 6f3cb6bd3ffed1fe5f06d00a962d5c191a50daf8
  # ViewInspector lets XCTest introspect rendered SwiftUI bodies (find buttons, simulate taps, assert state) without UI tests. Test-target only.
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector
    from: "0.10.3"

targets:
  PalkieTalkie:
    type: application
    platform: iOS
    sources:
      - PalkieTalkie
    settings:
      base:
        SWIFT_VERSION: "6.2"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: false
        # Auto-extract every SwiftUI LocalizedStringKey usage (Text("…"), Label("…"), navigationTitle("…"), etc.) into Localizable.xcstrings at build time. Translators fill in non-English entries; missing translations fall back to the English source.
        SWIFT_EMIT_LOC_STRINGS: "YES"
        LOCALIZED_STRING_MACRO_NAMES: "NSLocalizedString String"
        # Override xcodegen's default (`{prefix}.{target}` → `com.palkietalkie.PalkieTalkie`) to the shorter, all-lowercase canonical form. Lock in now before any Apple Developer / TestFlight / IAP / APNs registration — changing later is painful.
        PRODUCT_BUNDLE_IDENTIFIER: com.palkietalkie.app
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Apple Developer Program Team ID for wesnishio@gmail.com.
        DEVELOPMENT_TEAM: 7P7YY88H3V
      configs:
        # Per-config endpoint pinning. Xcode picks Debug for `xcodebuild build/test` and Release for `xcodebuild archive` (App Store / TestFlight). Info.plist below references these via `$(NAME)` so each scheme bakes the right URL/key.
        # None of these are secrets — Backend / PersonaPlex URLs are public hostnames, Clerk's pk_test_ / pk_live_ are `publishable` by design (meant to ship in clients). The pk_live_ key is the same one in backend/.env.production + ios/.env.production.
        Debug:
          BACKEND_URL: "https://palkietalkie-api-dev.fly.dev"
          PERSONAPLEX_HOST: "wss://palkietalkie-dev--api.modal.run"
          CLERK_PUBLISHABLE_KEY: "pk_test_Y3V0ZS10aWNrLTQxLmNsZXJrLmFjY291bnRzLmRldiQ"
          # Distinct home-screen label so a dev install is never mistaken for the prod build (bundle id stays the same — a dev bundle id would break dev's native Apple Sign In, which is registered to com.palkietalkie.app).
          APP_DISPLAY_NAME: "PT Dev"
        Release:
          BACKEND_URL: "https://api.palkietalkie.com"
          PERSONAPLEX_HOST: "wss://palkietalkie--api.modal.run"
          CLERK_PUBLISHABLE_KEY: "pk_live_Y2xlcmsucGFsa2lldGFsa2llLmNvbSQ"
          APP_DISPLAY_NAME: "Palkie Talkie"
    # Explicit Info.plist (xcodegen writes it) so we can add the OAuth URL scheme cleanly. Runtime values read via Bundle.main.object(forInfoDictionaryKey:).
    entitlements:
      path: PalkieTalkie/PalkieTalkie.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: PalkieTalkie/Info.plist
      properties:
        CFBundleDisplayName: "$(APP_DISPLAY_NAME)"
        # Portrait-only. The mic UI is portrait-anchored and landscape adds no value.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSMicrophoneUsageDescription: "Palkie Talkie needs microphone access for voice conversations."
        NSLocationWhenInUseUsageDescription: "Palkie Talkie uses your location so the AI shares the same place and weather as you."
        NSCalendarsUsageDescription: "Palkie Talkie reads today's events so the AI can ask about them naturally."
        UIBackgroundModes:
          - audio
        # We use only Apple's OS-provided standard encryption (TLS via URLSession + WebSocket). Declares export-compliance EXEMPT so App Store Connect doesn't block submission on "Encryption documentation required".
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        # Per-config substitution from settings.configs above — Debug bakes dev, Release bakes prd.
        BACKEND_URL: "$(BACKEND_URL)"
        PERSONAPLEX_HOST: "$(PERSONAPLEX_HOST)"
        CLERK_PUBLISHABLE_KEY: "$(CLERK_PUBLISHABLE_KEY)"
        CFBundleURLTypes:
          - CFBundleURLName: com.palkietalkie.oauth
            CFBundleURLSchemes:
              - palkietalkie
    dependencies:
      - package: Clerk
        product: ClerkKit
      - package: Opus
        product: Opus

  PalkieTalkieTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PalkieTalkieTests
      # Bundle the storekit fixture into the test target as a resource so SKTestSession(configurationFileNamed: "Configuration") can find it from XCTest. (In-process Product.products(for:) interception is unreliable on Xcode 26.2 — see SubscriptionStoreTests for the locked-in observation. XCUITest is what actually drives SubscriptionView's loaded-products branches.)
      - path: PalkieTalkie/Configuration.storekit
        buildPhase: resources
    settings:
      base:
        SWIFT_VERSION: "6.2"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: false
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PalkieTalkie.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PalkieTalkie"
        DEVELOPMENT_TEAM: 7P7YY88H3V
    dependencies:
      - target: PalkieTalkie
      - package: Opus
        product: Opus
      - package: ViewInspector
        product: ViewInspector

  # UI-test target that drives the real app to produce App Store screenshots. Separate from the unit-test bundle: UI tests are a distinct process, run signed (Clerk sign-in needs a keychain), and are slow — so they live behind their own scheme and never run in the unit-test CI path.
  PalkieTalkieScreenshots:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PalkieTalkieScreenshots
    settings:
      base:
        SWIFT_VERSION: "6.2"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: false
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 7P7YY88H3V
    dependencies:
      - target: PalkieTalkie

# Scheme definition — tells Xcode how to build/run the app
schemes:
  PalkieTalkie:
    build:
      targets:
        PalkieTalkie: all
        PalkieTalkieTests: [test]
    run:
      config: Debug
      storeKitConfiguration: PalkieTalkie/Configuration.storekit
    test:
      config: Debug
      # storeKitConfiguration intentionally NOT set here. The xcodebuild CLI ignores StoreKitConfigurationFileReference under TestAction (verified Xcode 26.2). Configuration.storekit is still attached to the run/launch scheme above so developers running the app from Xcode get the dev fixture; the unit-test path uses ProductProvider dependency injection (see SubscriptionStore).
      targets:
        - PalkieTalkieTests

  Screenshots:
    build:
      targets:
        PalkieTalkie: all
        PalkieTalkieScreenshots: [test]
    test:
      config: Debug
      targets:
        - PalkieTalkieScreenshots
